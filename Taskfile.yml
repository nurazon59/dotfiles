version: "3"

tasks:
  maintain:
    desc: Run all maintenance tasks
    cmds:
      - task: maintain:brew
      - task: maintain:mise
      - task: maintain:macos
      - task: maintain:nvim
      - task: maintain:fish
      - task: maintain:tmux
      - task: maintain:sheldon
      - task: maintain:colima
      - task: maintain:docker

  maintain:brew:
    desc: Update Homebrew and clean up cache
    cmds:
      - cmd: |
          command -v brew || exit 0
          echo "[brew] Updating..."
          brew update && brew upgrade
          brew cleanup --prune=30

  maintain:mise:
    desc: Upgrade mise runtimes and prune unused
    cmds:
      - cmd: |
          command -v mise || exit 0
          echo "[mise] Upgrading..."
          mise upgrade || true
          mise prune -y

  maintain:macos:
    desc: Check macOS software updates
    platforms: [darwin]
    cmds:
      - cmd: |
          echo "[macOS] Checking software updates..."
          softwareupdate -l 2>&1 || true

  maintain:nvim:
    desc: Update Neovim plugins, Treesitter, and Mason
    cmds:
      - cmd: |
          command -v nvim || exit 0
          echo "[nvim] Syncing plugins..."
          nvim --headless "+Lazy! sync" +qa 2>&1 || true
          echo "[nvim] Updating Treesitter parsers..."
          nvim --headless "+TSUpdateSync" +qa 2>&1 || true
          echo "[nvim] Updating Mason..."
          nvim --headless "+MasonUpdate" "+sleep 10" +qa 2>&1 || true

  maintain:fish:
    desc: Update fisher plugins
    cmds:
      - cmd: |
          command -v fish || exit 0
          fish -c "type -q fisher" || exit 0
          echo "[fish] Updating fisher plugins..."
          fish -c "fisher update"

  maintain:tmux:
    desc: Update tpm plugins
    cmds:
      - cmd: |
          [ -d ~/.tmux/plugins/tpm ] || exit 0
          echo "[tmux] Updating tpm plugins..."
          ~/.tmux/plugins/tpm/bin/update_plugins all

  maintain:sheldon:
    desc: Update sheldon plugins
    cmds:
      - cmd: |
          command -v sheldon || exit 0
          echo "[sheldon] Updating plugins..."
          sheldon lock --update

  maintain:colima:
    desc: Check colima VM status
    cmds:
      - cmd: |
          command -v colima || exit 0
          echo "[colima] Checking VM status..."
          colima status 2>&1 || echo "  colima is not running (start with: colima start)"

  maintain:docker:
    desc: Prune unused Docker resources
    cmds:
      - cmd: |
          command -v docker || exit 0
          docker info > /dev/null 2>&1 || exit 0
          echo "[docker] Pruning unused resources..."
          docker system prune -f
